name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: unit (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - name: Run unit tests
        run: pytest -q

  build:
    name: build wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  integration:
    name: integration (live pi, best-effort)
    runs-on: ubuntu-latest
    # Best-effort: spins up a real `pi` to smoke the bridge. Never blocks merges,
    # since it depends on the upstream npm package and default-model availability.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install -g @earendil-works/pi-coding-agent
      - run: pip install -e ".[dev]"
      - name: Run integration tests (non-LLM)
        run: pytest -m integration -q
