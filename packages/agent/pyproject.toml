[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "pi-agent"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "pi-ai",
    "pyyaml>=6.0",
    "pathspec>=0.12",
    "click>=8.0",
]

[project.scripts]
pi-py = "pi_agent.cli:main"

[tool.uv.sources]
pi-ai = { workspace = true }

[tool.hatch.build.targets.wheel]
packages = ["src/pi_agent"]
