[project]
name = "pi-ai"
version = "0.1.0"
description = "Unified LLM API for OpenAI, Anthropic, and compatible providers"
requires-python = ">=3.11"
dependencies = [
    "openai>=1.0.0",
    "anthropic>=0.40.0",
    "pydantic>=2.0.0",
    "json-repair>=0.30.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.24.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/pi_ai"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
